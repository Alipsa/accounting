name: Build Distributions

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            tasks: packageLinuxReleaseZip
            artifact: app/build/release/linux/alipsa-accounting-*.zip
          - os: windows-latest
            platform: windows
            tasks: packageWindowsReleaseZip
            artifact: app/build/release/windows-release/alipsa-accounting-*-windows.zip
          - os: macos-latest
            platform: macos
            tasks: packageMacosReleaseZip
            artifact: app/build/release/macos-release/alipsa-accounting-*-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build

      - name: Build distribution
        run: ./gradlew ${{ matrix.tasks }}

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.platform }}
          path: |
            ${{ matrix.artifact }}
            !**/*.asc
          if-no-files-found: error
          retention-days: 7

      - name: Upload platform-independent distribution
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: dist-generic
          path: app/build/distributions/app-*.zip
          if-no-files-found: error
          retention-days: 7
