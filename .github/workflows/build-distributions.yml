name: Build Distributions

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            tasks: packageLinuxReleaseZip
            artifact: app/build/release/linux/alipsa-accounting-*.zip
          - os: windows-latest
            platform: windows
            tasks: packageWindowsInstaller
            artifact: app/build/release/windows-installer/*
          - os: macos-latest
            platform: macos
            tasks: packageMacosAppImage
            artifact: app/build/release/macos/AlipsaAccounting-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Build distribution
        run: ./gradlew ${{ matrix.tasks }}

      - name: Collect macOS app into zip
        if: matrix.platform == 'macos'
        working-directory: app/build/release/macos
        run: zip -r AlipsaAccounting-macos.zip AlipsaAccounting.app

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            ${{ matrix.artifact }}
            !**/*.asc
          if-no-files-found: error
          retention-days: 7

      - name: Upload platform-independent distribution
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: dist-generic
          path: app/build/distributions/app-*.zip
          if-no-files-found: error
          retention-days: 7
